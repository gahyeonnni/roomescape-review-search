name: Refresh review data

# 리뷰 데이터 스냅샷을 주기적으로 다시 수집해 커밋한다.
# 수동 실행(workflow_dispatch) 또는 매주 월요일 자동 실행.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 1' # 매주 월요일 03:00 KST

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Collect data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/collect.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/reviews.json
          git diff --staged --quiet || git commit -m "chore: refresh review data snapshot"
          git push